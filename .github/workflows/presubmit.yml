# Sync with `libcxxext/.github/workflows/presubmit.yml`

name: Presubmit

on:
    push:
        branches: ["**"]
    workflow_dispatch:

jobs:
    findings_header:
        name: Findings Header
        runs-on: ubuntu-latest
        steps:
            - name: Upload Findings
              run: |
                  printf "# Findings\n\nThis presubmit run has produced the following findings!\n\n" >> $GITHUB_STEP_SUMMARY

    presubmit:
        name: ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Linux [x86_64] (x86_64-gcc)
                      os: ubuntu-latest
                      checkset: x86_64-linux-gcc
                    - name: msys2 [x86_64] (x86_64-gcc)
                      os: windows-latest
                      checkset: x86_64-msys64-gcc
                      msystem: MINGW64
                      packages: base-devel mingw-w64-x86_64-python
        defaults:
            run:
                shell: ${{ matrix.msystem && 'msys2 {0}' || 'bash' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup MSYS2
              if: matrix.msystem
              uses: msys2/setup-msys2@v2
              with:
                  msystem: ${{ matrix.msystem }}
                  update: true
                  install: ${{ matrix.packages }}

            - name: Setup Python
              if: ${{ !matrix.msystem }}
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Run Checkset
              env:
                  PYTHONUNBUFFERED: "1"
              run: python3 libcxxext/workflows/all_push.py -d=. -cs=${{ matrix.checkset }} -s -v

            - name: Upload Findings
              if: always()
              run: python3 libcxxext/workflows/all_findings.py -d=. -s -v >> $GITHUB_STEP_SUMMARY
